name: "shell-sentinel"
description: "Scan shell snippets/files for risky patterns (homograph URLs, pipe-to-shell, ANSI injection)."
author: "agent19710101"
branding:
  icon: "shield"
  color: "yellow"
inputs:
  input:
    description: "Shell payload text to scan (mutually exclusive with file/files)"
    required: false
  file:
    description: "Single file path to scan with --file mode (mutually exclusive with input/files)"
    required: false
  files:
    description: "Newline-separated git pathspecs for repo-wide scan (mutually exclusive with input/file)"
    required: false
  fail-on:
    description: "Fail threshold: warn|high"
    required: false
    default: "high"
  policy:
    description: "Optional .shell-sentinel.yaml path"
    required: false
  baseline:
    description: "Optional baseline file path for accepted findings"
    required: false
  source:
    description: "Logical source path used by rdjsonl output in input mode"
    required: false
    default: "shell-input"
  line:
    description: "Source line used by rdjsonl output in input mode"
    required: false
    default: "1"
  version:
    description: "Version to install (e.g. v0.10.0 or latest)"
    required: false
    default: "latest"
outputs:
  report:
    description: "JSON scan report"
  rdjsonl:
    description: "reviewdog rdjsonl diagnostics"
runs:
  using: "composite"
  steps:
    - name: Install shell-sentinel
      shell: bash
      run: |
        set -euo pipefail
        go install "github.com/agent19710101/shell-sentinel@${{ inputs.version }}"

    - name: Scan payload/file(s)
      id: scan
      shell: bash
      run: |
        set -euo pipefail

        bin_path="$(go env GOPATH)/bin/shell-sentinel"
        report_file="$(mktemp)"
        rdjsonl_file="$(mktemp)"

        policy_args=()
        if [[ -n "${{ inputs.policy }}" ]]; then
          policy_args+=(--policy "${{ inputs.policy }}")
        fi

        baseline_args=()
        if [[ -n "${{ inputs.baseline }}" ]]; then
          baseline_args+=(--baseline "${{ inputs.baseline }}")
        fi

        mode_count=0
        [[ -n "${{ inputs.input }}" ]] && mode_count=$((mode_count + 1))
        [[ -n "${{ inputs.file }}" ]] && mode_count=$((mode_count + 1))
        [[ -n "${{ inputs.files }}" ]] && mode_count=$((mode_count + 1))

        if [[ ${mode_count} -ne 1 ]]; then
          echo "exactly one of 'input', 'file', or 'files' must be set"
          exit 2
        fi

        severity_rank() {
          case "$1" in
            high) echo 3 ;;
            warn) echo 2 ;;
            info) echo 1 ;;
            *) echo 0 ;;
          esac
        }

        merge_reports() {
          jq -s '
            def sev_rank($s): if $s == "high" then 3 elif $s == "warn" then 2 elif $s == "info" then 1 else 0 end;
            def max_sev($arr):
              ($arr | map({s: ., r: sev_rank(.)}) | sort_by(.r) | last | .s) // "none";
            {
              input: (if length == 1 then .[0].input else "multiple" end),
              severity: max_sev(map(.severity // "none")),
              stats: {
                total: (map(.stats.total // (.findings | length)) | add // 0),
                high:  (map(.stats.high // ((.findings // []) | map(select(.severity == "high")) | length)) | add // 0),
                warn:  (map(.stats.warn // ((.findings // []) | map(select(.severity == "warn")) | length)) | add // 0),
                info:  (map(.stats.info // ((.findings // []) | map(select(.severity == "info")) | length)) | add // 0)
              },
              findings: (map(.findings // []) | add)
            }
          ' "$@"
        }

        tmpdir="$(mktemp -d)"
        trap 'rm -rf "${tmpdir}"' EXIT

        overall_status=0

        if [[ -n "${{ inputs.input }}" ]]; then
          set +e
          "${bin_path}" --json --fail-on "${{ inputs.fail-on }}" "${policy_args[@]}" "${baseline_args[@]}" "${{ inputs.input }}" >"${report_file}"
          status=$?
          set -e

          "${bin_path}" --rdjsonl --source "${{ inputs.source }}" --line "${{ inputs.line }}" "${policy_args[@]}" "${baseline_args[@]}" "${{ inputs.input }}" >"${rdjsonl_file}"
          overall_status=${status}

        elif [[ -n "${{ inputs.file }}" ]]; then
          set +e
          "${bin_path}" --json --fail-on "${{ inputs.fail-on }}" "${policy_args[@]}" "${baseline_args[@]}" --file "${{ inputs.file }}" >"${report_file}"
          status=$?
          set -e

          "${bin_path}" --rdjsonl "${policy_args[@]}" "${baseline_args[@]}" --file "${{ inputs.file }}" >"${rdjsonl_file}"
          overall_status=${status}

        else
          mapfile -t raw_patterns < <(printf '%s\n' "${{ inputs.files }}")
          patterns=()
          for p in "${raw_patterns[@]}"; do
            [[ -z "${p// }" ]] && continue
            patterns+=("${p}")
          done

          if [[ ${#patterns[@]} -eq 0 ]]; then
            echo "'files' input was set but no pathspecs were provided"
            exit 2
          fi

          mapfile -t scan_files < <(git ls-files -- "${patterns[@]}" | sort -u)
          if [[ ${#scan_files[@]} -eq 0 ]]; then
            echo "no files matched pathspecs: ${patterns[*]}"
            jq -n '{input:"multiple",severity:"none",stats:{total:0,high:0,warn:0,info:0},findings:[]}' >"${report_file}"
            : >"${rdjsonl_file}"
          else
            reports=()
            : >"${rdjsonl_file}"
            for f in "${scan_files[@]}"; do
              report_part="${tmpdir}/$(echo "${f}" | tr '/ ' '__').json"
              rd_part="${tmpdir}/$(echo "${f}" | tr '/ ' '__').rdjsonl"

              set +e
              "${bin_path}" --json --fail-on "${{ inputs.fail-on }}" "${policy_args[@]}" "${baseline_args[@]}" --file "${f}" >"${report_part}"
              status=$?
              set -e

              if [[ ${status} -eq 2 ]]; then
                cat "${report_part}" || true
                exit 2
              fi
              if [[ ${status} -eq 1 ]]; then
                overall_status=1
              fi

              "${bin_path}" --rdjsonl "${policy_args[@]}" "${baseline_args[@]}" --file "${f}" >"${rd_part}"
              cat "${rd_part}" >>"${rdjsonl_file}"
              reports+=("${report_part}")
            done

            merge_reports "${reports[@]}" >"${report_file}"
          fi
        fi

        {
          echo "report<<EOF"
          cat "${report_file}"
          echo "EOF"
        } >>"$GITHUB_OUTPUT"

        {
          echo "rdjsonl<<EOF"
          cat "${rdjsonl_file}"
          echo "EOF"
        } >>"$GITHUB_OUTPUT"

        # Emit workflow annotations using rdjsonl diagnostics for precise file/line metadata.
        while IFS=$'\t' read -r level kind msg source line; do
          [[ -z "${level}" ]] && continue
          text="${msg}"
          text="${text//'%'/'%25'}"
          text="${text//$'\n'/'%0A'}"
          text="${text//$'\r'/'%0D'}"

          if [[ -n "${source}" && "${source}" != "null" ]]; then
            if [[ -n "${line}" && "${line}" != "null" ]]; then
              echo "::${level} file=${source},line=${line},title=shell-sentinel/${kind}::${text}"
            else
              echo "::${level} file=${source},title=shell-sentinel/${kind}::${text}"
            fi
          else
            echo "::${level} title=shell-sentinel/${kind}::${text}"
          fi
        done < <(jq -r '
          . as $d |
          [
            (if $d.severity == "ERROR" then "error" elif $d.severity == "WARNING" then "warning" else "notice" end),
            ($d.code.value // "unknown"),
            ($d.message // "shell-sentinel finding"),
            ($d.location.path // ""),
            (($d.location.range.start.line // "") | tostring)
          ] | @tsv
        ' "${rdjsonl_file}")

        if [[ ${overall_status} -eq 1 ]]; then
          echo "shell-sentinel findings reached fail-on=${{ inputs.fail-on }} threshold."
          exit 1
        fi

        if [[ ${overall_status} -eq 2 ]]; then
          echo "shell-sentinel usage/configuration error."
          cat "${report_file}" || true
          exit 2
        fi

        echo "shell-sentinel scan passed."
