name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt check
        run: test -z "$(gofmt -l ./cmd ./pkg)"
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
